name: MARIO - Intégrations continues

on:
  push:
    branches: 
      - main
      - 'Integration*'
      - 'fonctionnalite/*'
  pull_request:
    branches: [ "main" ]

jobs:
  health-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]

    steps:
    - uses: actions/checkout@v3

    - name: Setup des packages Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Installations des dépendances
      run: |
        # Installation de pip pour gérer les installations
        python -m pip install --upgrade pip
        # Installations et gestion des versions
        pip install setuptools==65.5.0 pip==21 wheel==0.38.0
        pip install "protobuf<3.20"
        pip install gym==0.21.0
        pip install "numpy==1.23.5"
        # Installation du package pour tester le setup.py
        pip install -e Mario/Dev/src/
        # Installations minimales de dépendances afin que les imports ne plantent pas
        pip install marllib pettingzoo[mpe]

    - name: Analyse syntaxique du code
      run: |
        # Installation de flake8 ( Vérification de la syntaxe et conformité du code )
        pip install flake8
        # Interrompt le pipeline en cas d'erreurs logiques ou de syntaxes critiques
        flake8 Mario/Dev/src/mario --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Smoke Test Imports
      env:
        # ( sert à forcer la compatibilité du protobuf avec python )
        PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
      run: |
        # Vérifivation que les classes soient importables correctement
        # ( sans erreur de dépendance ou de nommage de fichier )
        python -c "from mario.engine import RunEngine; from mario.algos.ppo import PPOAlgo; print('Importations fonctionnelles !')"

    - name: Test d'intégration- Entraînement complet (3 itérations)
      env:
        PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
      run: |
        # On lance le script de test que nous venons de stabiliser
        # Vérification du bon fonctionnement du train() et du predict() (vide pour l'instant) passent bien
        python Mario/Dev/src/tests/pipeline_test.py